<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiMart - Ngày Hội Tuyển Dụng & Ứng Tuyển Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --himart-green: #00994C;
            --himart-dark-green: #00703C;
            --himart-yellow: #FFC90E;
            --himart-red: #E11C24;
            --text-main: #333333;
            --bg-light: #F4FAF6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
            color: var(--text-main);
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        /* Poster Side */
        .poster {
            background: linear-gradient(135deg, var(--himart-green) 0%, var(--himart-dark-green) 100%);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border-radius: 24px;
            overflow: hidden;
            position: sticky;
            top: 40px;
            color: #fff;
        }

        .decor-circle {
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            z-index: 0;
        }

        .poster-content {
            position: relative;
            z-index: 1;
            padding: 30px;
        }

        /* Header Section */
        .header { text-align: center; margin-bottom: 25px; }
        .logo-box {
            display: inline-block; background: var(--himart-yellow); color: var(--himart-dark-green);
            font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 28px;
            padding: 8px 25px; border-radius: 50px; margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .title-main { font-family: 'Outfit', sans-serif; font-size: 48px; font-weight: 900; line-height: 1.1; margin-bottom: 10px; text-shadow: 2px 2px 0px rgba(0,0,0,0.2); }
        .subtitle { background: var(--himart-red); display: inline-block; font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 700; padding: 6px 20px; border-radius: 50px; }

        /* Info Cards in Poster */
        .card { background: #fff; border-radius: 16px; padding: 20px; color: var(--text-main); margin-bottom: 15px; border-left: 6px solid var(--himart-yellow); }
        .card.highlight { border-left: 6px solid var(--himart-red); background: var(--bg-light); }
        .card-title { font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 800; color: var(--himart-dark-green); margin-bottom: 15px; }
        
        .job-item { display: flex; align-items: flex-start; margin-bottom: 12px; font-weight: 500; font-size: 15px; }
        .job-qty { color: var(--himart-red); font-weight: 800; font-family: 'Outfit', sans-serif; font-size: 20px; margin-right: 8px; }

        .benefit-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .benefit-item { background: #fff; border: 1px solid #E5E7EB; padding: 10px 15px; border-radius: 8px; font-weight: 600; font-size: 14px; }
        .benefit-item.salary { background: #FFFBEB; border-color: var(--himart-yellow); color: #D97706; font-size: 18px; }
        .salary-amount { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 900; color: var(--himart-red); float: right; }

        /* Form Side */
        .form-wrapper {
            background: #fff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #eee;
        }

        .form-header { margin-bottom: 30px; }
        .form-header h2 { font-family: 'Outfit', sans-serif; font-size: 32px; font-weight: 800; color: var(--himart-dark-green); margin-bottom: 10px; }
        .form-header p { color: #666; font-size: 16px; font-weight: 500; }

        .form-group { margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        label { display: block; font-weight: 700; margin-bottom: 8px; color: #444; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        .required { color: var(--himart-red); }
        
        input[type="text"], input[type="tel"], input[type="date"], select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            background: #f8fafc;
            transition: all 0.2s;
            outline: none;
        }

        input:focus, select:focus, textarea:focus { border-color: var(--himart-green); background: #fff; box-shadow: 0 0 0 3px rgba(0, 153, 76, 0.1); }
        textarea { resize: vertical; min-height: 100px; }

        .submit-btn {
            width: 100%;
            background: var(--himart-green);
            color: #fff;
            border: none;
            padding: 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 10px;
        }
        
        .submit-btn:hover { background: var(--himart-dark-green); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 153, 76, 0.2); }
        
        .success-message {
            display: none;
            background: #ecfdf5;
            border: 1px solid #10b981;
            color: #047857;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            font-weight: 600;
            text-align: center;
        }

        @media (max-width: 900px) {
            body { padding: 20px 12px; }
            .container { grid-template-columns: 1fr; gap: 20px; }
            .poster-image-container { position: static; border-radius: 16px; }
            .form-wrapper { padding: 24px 16px; border-radius: 16px; }
            .form-header h2 { font-size: 26px; }
        }

        @media (max-width: 480px) {
            .form-header h2 { font-size: 22px; }
            .submit-btn { font-size: 18px; padding: 14px; }
            label { font-size: 12px; }
            input, select, textarea { font-size: 14px; padding: 10px 14px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. POSTER SIDE -->
        <div class="poster-image-container" style="border-radius: 24px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.15); position: sticky; top: 40px;">
            <!-- User sẽ lưu ảnh dưới dạng images/poster-tuyen-dung.jpg -->
            <img src="../images/poster-tuyen-dung.jpg" alt="HiMart Recruitment Poster" style="width: 100%; display: block; height: auto;">
        </div>

        <!-- 2. APPLICATION FORM SIDE -->
        <div class="form-wrapper">
            <div class="form-header">
                <h2>Cơ Hội Việc Làm Liền Tay!</h2>
                <p>Điền thông tin ứng tuyển trực tuyến. Bộ phận nhân sự sẽ liên hệ gọi bạn đi phỏng vấn trong vòng 24h.</p>
            </div>

            <form id="applyForm" onsubmit="handleApply(event)">
                <div class="form-group">
                    <label>Họ và tên <span class="required">*</span></label>
                    <input type="text" id="fullname" name="entry.fullname" placeholder="Ví dụ: Nguyễn Văn A" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Giới tính <span class="required">*</span></label>
                        <select id="gender" name="entry.gender" required>
                            <option value="">-- Chọn giới tính --</option>
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Ngày tháng năm sinh <span class="required">*</span></label>
                        <input type="date" id="dob" name="entry.dob" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Số điện thoại liên hệ <span class="required">*</span></label>
                        <input type="tel" id="phone" name="entry.phone" placeholder="09xx xxx xxx" required>
                    </div>
                    <div class="form-group">
                        <label>Vị trí ứng tuyển <span class="required">*</span></label>
                        <select id="position" name="entry.position" required>
                            <option value="">-- Chọn vị trí --</option>
                            <option value="Sắp xếp hàng hóa">Nhân viên Sắp xếp hàng hóa</option>
                            <option value="Thực phẩm tươi sống">Nam NV Thực phẩm tươi sống</option>
                            <option value="Thu Ngân">Nhân viên Thu Ngân</option>
                            <option value="Giao Hàng">Nhân viên Giao Hàng</option>
                            <option value="Khác">Vị trí khác</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Địa chỉ hiện tại đang ở <span class="required">*</span></label>
                    <input type="text" id="address" name="entry.address" placeholder="Phường, Quận, Thành phố..." required>
                </div>

                <div class="form-group">
                    <label>Kinh nghiệm làm việc (Nếu có)</label>
                    <textarea id="experience" name="entry.experience" placeholder="Bạn từng làm việc ở đâu, công việc là gì? (Không bắt buộc nhưng sẽ là điểm cộng)"></textarea>
                </div>

                <div class="form-group">
                    <label>Bạn biết đến tin tuyển dụng qua đâu?</label>
                    <select id="source" name="entry.source">
                        <option value="Fanpage Facebook">Fanpage Facebook</option>
                        <option value="Website HiMart">Website HiMart</option>
                        <option value="Bạn bè giới thiệu">Bạn bè giới thiệu</option>
                        <option value="Hội nhóm Zalo">Hội nhóm Zalo</option>
                        <option value="Nguồn khác">Nguồn khác</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    NỘP HỒ SƠ ỨNG TUYỂN
                </button>
                <div id="successMsg" class="success-message">
                    <i class="fa-solid fa-circle-check"></i> Đăng ký thành công! HiMart sẽ liên hệ với bạn trong thời gian sớm nhất.
                </div>
                <div id="errorMsg" class="success-message" style="display:none; border-color: #ef4444; color: #b91c1c; background: #fef2f2;">
                    <i class="fa-solid fa-circle-xmark"></i> Có lỗi xảy ra. Hãy thử lại hoặc liên hệ Zalo nhé.
                </div>
            </form>
        </div>
    </div>

    <script>
        // BƯỚC 2: SAU KHI LÀM GOOGLE SHEET, DÁN LINK WEB APP VÀO ĐÂY NHÉ:
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwZ9H7ds-cXcvDTXY9yCHDL0F9AQ0J6AP5euQjbPdtU7hs-TZXAK7HK6dg15RVOu106ew/exec';

        async function handleApply(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('successMsg');
            const errMsg = document.getElementById('errorMsg');
            const form = document.getElementById('applyForm');
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ĐANG TRUYỀN DỮ LIỆU...';
            btn.style.opacity = '0.8';
            btn.disabled = true;
            errMsg.style.display = 'none';

            // Thu thập dữ liệu
            const formData = new FormData();
            formData.append('fullname', document.getElementById('fullname').value);
            formData.append('gender', document.getElementById('gender').value);
            formData.append('dob', document.getElementById('dob').value);
            formData.append('phone', document.getElementById('phone').value);
            formData.append('position', document.getElementById('position').value);
            formData.append('address', document.getElementById('address').value);
            formData.append('experience', document.getElementById('experience').value);
            formData.append('source', document.getElementById('source').value);
            formData.append('timestamp', new Date().toLocaleString('vi-VN'));

            try {
                // Gửi dữ liệu thật lên Google Sheets
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors' // Giúp tránh lỗi CORS khi submit form JS
                });

                form.reset();
                btn.style.display = 'none';
                msg.style.display = 'block';
            } catch (error) {
                btn.innerHTML = 'CÓ LỖI. VUI LÒNG THỬ LẠI';
                btn.style.opacity = '1';
                btn.disabled = false;
                errMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
